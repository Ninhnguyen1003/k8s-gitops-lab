apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: ninhnguyen1003/myapp:9bc275da83c51df0d3a2742e471cafdb605e39d7
        ports:
        - containerPort: 8080