apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: ninhnguyen1003/myapp:155b4e4f2152d6ed9ccf03c4b2ae6d953d89bda6
        ports:
        - containerPort: 8080