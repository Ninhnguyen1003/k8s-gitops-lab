apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: ninhnguyen1003/myapp:5e105543a95b59725a556ece792fbf3e33c04ffc
        ports:
        - containerPort: 8080